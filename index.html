<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->
    <title>OXERFY | Digital Agency — Web, AI & Marketing</title>
    <meta name="description" content="Oxerfy is a digital agency offering WordPress Web Development, AI Automation, Meta Marketing, and Social Media Management. Based in Dhaka, serving clients worldwide." />
    <meta name="keywords" content="digital agency, wordpress development, AI automation, meta marketing, social media management, SME digitalize, Dhaka, Bangladesh" />
    <meta name="author" content="Oxerfy" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://oxerfy.com/" />

    <!-- Favicon (put these files in /public folder) -->
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png" />

    <!-- PWA / Android -->
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#00adb5" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Oxerfy" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Oxerfy" />
    <meta property="og:url" content="https://oxerfy.com/" />
    <meta property="og:title" content="OXERFY | Digital Agency — Web, AI & Marketing" />
    <meta property="og:description" content="Grow your business with expert WordPress development, AI automation, Meta marketing & social media management. Based in Dhaka — serving clients worldwide." />
    <meta property="og:image" content="https://oxerfy.vercel.app/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Oxerfy — Digital Agency for Web, AI & Marketing" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@oxerfy" />
    <meta name="twitter:url" content="https://oxerfy.com/" />
    <meta name="twitter:title" content="OXERFY | Digital Agency — Web, AI & Marketing" />
    <meta name="twitter:description" content="Grow your business with expert WordPress development, AI automation, Meta marketing & social media management." />
    <meta name="twitter:image" content="https://oxerfy.vercel.app/og-image.jpg" />
    <meta name="twitter:image:alt" content="Oxerfy — Digital Agency" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Oxerfy",
      "url": "https://oxerfy.vercel.app",
      "logo": "https://oxerfy.vercel.app/favicon-32x32.png",
      "image": "https://oxerfy.vercel.app/og-image.jpg",
      "description": "Oxerfy is a digital agency offering WordPress Web Development, AI Automation, Meta Marketing, and Social Media Management.",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Dhaka",
        "addressCountry": "BD"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "oxerfy@gmail.com",
        "contactType": "customer service"
      },
      "sameAs": [
        "https://facebook.com/oxerfy",
        "https://instagram.com/oxerfy",
        "https://linkedin.com/company/oxerfy"
      ],
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Digital Services",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "WordPress Web Development" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "AI Automation" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Meta Marketing" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Social Media Management" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "SME Digitalize" } }
        ]
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
